{% extends "auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-box">
  <div class="login-logo">
    <span class="brand-text font-weight-light">
      <img src="{{ url_for('static', filename='img/cds.png') }}" alt="Instrument Monitoring" style="max-height: 100px;">
    </span>
  </div>
  <div class="card">
    <div class="card-body login-card-body">

      <p style="font-size: 1.5rem;text-align: center; text-transform: uppercase;"><b >Service<span class="text-primary pl-1">Support</span></b></p>
      <!-- <p class="login-box-msg">Sign in to start your session</p> -->

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="input-group mb-3">
          <input type="text" name="username" class="form-control" placeholder="Username" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-user"></span></div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" name="password" class="form-control" placeholder="Password" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-lock"></span></div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
