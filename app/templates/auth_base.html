<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Login{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <style>
    /* Floating alert stack bottom-right */
    .alert-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      max-width: 360px;
      z-index: 1080;
      pointer-events: none;
    }
    .alert-stack .alert {
      pointer-events: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    /* Subtle fade/slide for auto-dismissing alerts */
    @keyframes alert-fade-up {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-8px); }
    }
    .alert.alert-dismiss-anim {
      animation: alert-fade-up 400ms ease forwards;
    }
  </style>
  {% block styles %}{% endblock %}
</head>
<body class="hold-transition login-page">
  {% block content %}{% endblock %}
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="alert-stack">
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const alerts = document.querySelectorAll('.alert');
      alerts.forEach((alert) => {
        setTimeout(() => {
          alert.classList.add('alert-dismiss-anim');
          alert.addEventListener('animationend', () => {
            if (alert.classList.contains('show')) {
              $(alert).alert('close');
            } else {
              alert.remove();
            }
          }, { once: true });
        }, 5000);
      });
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
